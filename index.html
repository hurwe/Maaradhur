<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#07070f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="معرض حُر">
<meta name="description" content="مكتبة البرومتات السينمائية الإبداعية — معرض حُر">
<title>معرض حُر | Horr Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ════════════════════════════════════
   RESET & TOKENS
════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Gold palette */
  --gold:#c9a227;
  --gold-l:#f5d06a;
  --gold-xl:#fde68a;
  --gold-d:rgba(201,162,39,.1);
  --gold-d2:rgba(201,162,39,.18);
  --gold-glow:rgba(201,162,39,.32);

  /* Dark ink palette */
  --ink:#07070f;
  --ink-1:#0c0c1a;
  --ink-2:#101021;
  --ink-3:#161628;
  --ink-4:#1d1d32;

  /* Borders */
  --border:rgba(255,255,255,.065);
  --border-2:rgba(255,255,255,.1);
  --border-gold:rgba(201,162,39,.22);
  --border-gold-2:rgba(201,162,39,.4);

  /* Text */
  --text:#e8e8f2;
  --text-dim:#6e6e84;
  --text-soft:#adadc0;

  /* Semantic */
  --like:#ff4f6a;
  --like-bg:rgba(255,79,106,.08);
  --green:#22c55e;
  --red:#ef4444;

  /* Radii */
  --r:12px;
  --r-lg:18px;
  --r-xl:24px;
  --r-2xl:32px;

  /* Easing */
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --ease-out:cubic-bezier(.22,1,.36,1);
  --ease-smooth:cubic-bezier(.4,0,.2,1);

  /* Shadows */
  --shadow-sm:0 2px 8px rgba(0,0,0,.3);
  --shadow-md:0 6px 24px rgba(0,0,0,.45);
  --shadow-lg:0 20px 72px rgba(0,0,0,.7);
  --shadow-card:0 4px 20px rgba(0,0,0,.4);
  --shadow-gold:0 0 32px rgba(201,162,39,.2);
}

html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:'Tajawal',system-ui,sans-serif;
  background:var(--ink);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
img{-webkit-user-drag:none;user-drag:none;display:block}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}
a{text-decoration:none}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gold-d2);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:rgba(201,162,39,.38)}
::selection{background:rgba(201,162,39,.22);color:#fff}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}

/* ════════════════════════════════════
   AMBIENT BACKGROUND
════════════════════════════════════ */
.ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
/* Orbs — ثابتة بدون animation لأداء أفضل */
.orb{position:absolute;border-radius:50%;opacity:.6}
.orb-a{
  width:600px;height:600px;top:-200px;right:-150px;
  background:radial-gradient(circle,rgba(201,162,39,.07) 0%,transparent 65%);
  filter:blur(80px);
}
.orb-b{
  width:500px;height:500px;bottom:-180px;left:-120px;
  background:radial-gradient(circle,rgba(70,40,180,.06) 0%,transparent 65%);
  filter:blur(80px);
}
.orb-c,.orb-d{display:none}

/* ════════════════════════════════════
   LIQUID GLASS — نظام iOS 26
════════════════════════════════════ */

/* متغيرات الزجاج السائل */
:root {
  --lg-tint: rgba(201,162,39,.10);
  --lg-tint-hover: rgba(201,162,39,.18);
  --lg-border: rgba(255,255,255,.22);
  --lg-border-hover: rgba(201,162,39,.55);
  --lg-shadow: 0 4px 24px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.18);
  --lg-shadow-hover: 0 12px 40px rgba(0,0,0,.40), inset 0 1px 0 rgba(255,255,255,.25);
  --lg-blur: blur(12px) saturate(140%);
  --lg-blur-heavy: blur(20px) saturate(160%);
  --lg-radius: 18px;
  --lg-radius-lg: 26px;
  --lg-transition: transform .32s cubic-bezier(.34,1.12,.64,1), box-shadow .32s cubic-bezier(.34,1.12,.64,1), background .32s cubic-bezier(.34,1.12,.64,1), border-color .32s cubic-bezier(.34,1.12,.64,1), color .32s cubic-bezier(.34,1.12,.64,1), opacity .32s cubic-bezier(.34,1.12,.64,1);
  /* متغيرات الشفافية الديناميكية */
  --glass-alpha: 0.10;
  --glass-alpha2: 0.06;
}

/* الزجاج الحقيقي — شفاف وخفيف */
.glass, .lg {
  background: linear-gradient(135deg,
    rgba(255,255,255,.18) 0%,
    rgba(255,255,255,.08) 50%,
    rgba(255,255,255,.12) 100%);
  border: 1px solid rgba(255,255,255,.25);
  box-shadow: var(--lg-shadow);
  position: relative;
  overflow: hidden;
}

/* وميض الزجاج */
.glass::before, .lg::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg,
    rgba(255,255,255,.22) 0%,
    rgba(255,255,255,.08) 40%,
    transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* بريق علوي */
.glass::after, .lg::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(255,255,255,.55) 35%,
    rgba(201,162,39,.35) 65%,
    transparent 100%);
  pointer-events: none;
  z-index: 1;
}

/* ════════════════════════════════════
   HEADER
════════════════════════════════════ */
.header{
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  background: linear-gradient(180deg, rgba(5,5,15,.88) 0%, rgba(8,8,20,.82) 100%);
  border-bottom: 1px solid rgba(255,255,255,.10);
  box-shadow: 0 1px 0 rgba(201,162,39,.08), 0 8px 22px -6px rgba(0,0,0,.5);
  transition: background .3s;
}
.header::after {
  content:'';
  position:absolute;
  bottom:0; left:0; right:0;
  height:1px;
  background: linear-gradient(90deg, transparent, rgba(201,162,39,.25) 30%, rgba(255,255,255,.15) 50%, rgba(201,162,39,.25) 70%, transparent);
  pointer-events:none;
}
.header.scrolled{
  background: linear-gradient(180deg, rgba(4,4,12,.92) 0%, rgba(7,7,15,.88) 100%);
  box-shadow: 0 4px 40px rgba(0,0,0,.55),
              0 0 0 1px rgba(201,162,39,.10),
              inset 0 1px 0 rgba(255,255,255,.06);
}
.header-inner{
  max-width:1160px;margin:0 auto;
  padding:0 28px;height:64px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}

.logo{display:flex;align-items:center;gap:13px;text-decoration:none}
.logo-mark{
  width:40px;height:40px;border-radius:50%;
  background: radial-gradient(circle at 35% 35%,
    rgba(201,162,39,.20) 0%,
    rgba(0,0,0,.85) 60%,
    rgba(201,162,39,.08) 100%);
  border: 1.5px solid rgba(201,162,39,.35);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  transition: transform .45s cubic-bezier(.34,1.56,.64,1), box-shadow .45s cubic-bezier(.34,1.56,.64,1), background .45s cubic-bezier(.34,1.56,.64,1), border-color .45s cubic-bezier(.34,1.56,.64,1), color .45s cubic-bezier(.34,1.56,.64,1), opacity .45s cubic-bezier(.34,1.56,.64,1);
  box-shadow:
    0 4px 16px rgba(0,0,0,.4),
    0 0 0 0.5px rgba(255,255,255,.08) inset,
    inset 0 1px 0 rgba(255,255,255,.15);
  overflow:hidden;
}
.logo-mark::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background: linear-gradient(135deg, rgba(255,255,255,.18) 0%, transparent 50%);
  pointer-events:none;
}
.logo:hover .logo-mark{
  transform:scale(1.10) rotate(6deg);
  box-shadow:
    0 8px 28px rgba(201,162,39,.35),
    0 0 0 1.5px rgba(201,162,39,.25),
    inset 0 1px 0 rgba(255,255,255,.2);
  border-color: rgba(201,162,39,.55);
}
.logo-char{width:100%;height:100%;object-fit:cover;z-index:1;position:relative}
.logo-text h1{
  font-size:14.5px;font-weight:900;color:#fff;
  letter-spacing:.25px;line-height:1.2;
}
.logo-text p{font-size:9px;color:var(--text-dim);margin-top:2px;font-weight:400;letter-spacing:.2px}

.header-badge{
  display:inline-block;font-size:8px;padding:2px 7px;
  border-radius:5px;border:1px solid var(--border-gold);
  color:var(--gold);font-weight:700;
  margin-right:6px;vertical-align:middle;
  letter-spacing:.3px;opacity:.85;
}

.header-actions{display:flex;align-items:center;gap:8px}

/* Compact header install + audio controls (inline, non-floating) */
.header-mini-actions{display:flex;align-items:center;gap:6px;margin-left:6px}
.header-install-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  padding:7px 12px;border-radius:99px;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold-l) 100%);
  color:var(--ink);border:none;
  font-size:10.5px;font-weight:800;letter-spacing:.1px;
  white-space:nowrap;
  box-shadow:0 2px 10px rgba(201,162,39,.3);
  transition:transform .2s var(--ease-out),box-shadow .2s;
}
.header-install-btn svg{width:12px;height:12px;flex-shrink:0}
.header-install-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,162,39,.45)}
.header-install-btn:active{transform:scale(.95)}
.header-audio-toggle{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  background:var(--ink-3);
  border:1px solid var(--border-gold);
  color:var(--gold);
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s var(--ease-spring),background .2s;
}
.header-audio-toggle svg{width:13px;height:13px}
.header-audio-toggle:hover{background:var(--ink-4)}
.header-audio-toggle:active{transform:scale(.9)}
@media(max-width:640px){
  .header-install-btn span{display:none}
  .header-install-btn{padding:7px;width:30px;height:30px}
  .header-install-btn svg{width:13px;height:13px}
}

/* ════════════════════════════════════
   BUTTONS
════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:none;border-radius:var(--r);
  font-weight:700;font-size:11.5px;
  transition: transform .18s cubic-bezier(.22,1,.36,1), box-shadow .18s ease, background .25s;
  white-space:nowrap;position:relative;overflow:hidden;
  letter-spacing:.1px;
  transform-style:preserve-3d;
  /* حافة سفلية ثابتة تعطي إحساس سُمك فيزيائي للزر */
  box-shadow: 0 3px 0 rgba(0,0,0,.35), 0 5px 10px rgba(0,0,0,.25);
  transform: translateZ(0);
}
/* طبقة الوميض */
.btn::before{
  content:'';position:absolute;
  top:0; left:0; right:0;
  height:50%;
  background: linear-gradient(180deg, rgba(255,255,255,.18) 0%, transparent 100%);
  pointer-events:none;
  border-radius: inherit;
  z-index:1;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 55%);
  opacity:0;transition:opacity .25s;pointer-events:none;
  border-radius: inherit;
  z-index:2;
}
.btn:hover::after{opacity:1}
.btn:hover{transform:translateY(-2px);box-shadow:0 5px 0 rgba(0,0,0,.35), 0 10px 18px rgba(0,0,0,.3);}
/* الضغط — الزر "ينغرز" فيزيائياً للأسفل ويفقد سُمكه لحظياً */
.btn:active{
  transform:translateY(3px) scale(.97)!important;
  box-shadow: 0 0 0 rgba(0,0,0,.35), 0 2px 6px rgba(0,0,0,.2)!important;
  transition: transform .08s ease, box-shadow .08s ease;
}

.btn-sm{padding:7px 14px;font-size:10.5px}
.btn-md{padding:10px 20px}
.btn-lg{padding:13px 30px;font-size:13px}

.btn-gold{
  background: linear-gradient(135deg,
    rgba(201,162,39,.95) 0%,
    rgba(245,208,106,.90) 50%,
    rgba(201,162,39,.88) 100%);
  color:var(--ink);font-weight:800;
  border: 1px solid rgba(255,255,255,.25);
  box-shadow:
    0 4px 0 rgba(140,105,15,.55),
    0 8px 18px rgba(201,162,39,.30),
    inset 0 1px 0 rgba(255,255,255,.35);
}
.btn-gold:hover{
  background: linear-gradient(135deg,
    rgba(220,175,50,.98) 0%,
    rgba(255,220,110,.95) 50%,
    rgba(220,175,50,.92) 100%);
  box-shadow:
    0 5px 0 rgba(140,105,15,.55),
    0 12px 26px rgba(201,162,39,.40),
    inset 0 1px 0 rgba(255,255,255,.40);
  transform:translateY(-2px);
}
.btn-gold:active{
  transform:translateY(3px) scale(.97)!important;
  box-shadow: 0 0 0 rgba(140,105,15,.55), 0 2px 8px rgba(201,162,39,.25)!important;
}

.btn-ghost{
  background: linear-gradient(135deg,
    rgba(255,255,255,.06) 0%,
    rgba(255,255,255,.02) 100%);
  border:1px solid rgba(255,255,255,.12);
  color:var(--text-dim);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
}
.btn-ghost:hover{
  background: linear-gradient(135deg,
    rgba(201,162,39,.12) 0%,
    rgba(255,255,255,.06) 100%);
  border-color:rgba(201,162,39,.35);
  color:var(--gold-l);
  box-shadow: 0 4px 16px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.12);
}

.btn-outline{
  background: linear-gradient(135deg,
    rgba(201,162,39,.12) 0%,
    rgba(201,162,39,.06) 100%);
  border:1px solid rgba(201,162,39,.30);
  color:var(--gold);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.10);
}
.btn-outline:hover{
  background: linear-gradient(135deg,
    rgba(201,162,39,.88) 0%,
    rgba(245,208,106,.82) 100%);
  border-color: rgba(201,162,39,.60);
  color:var(--ink);
  box-shadow: 0 6px 20px rgba(201,162,39,.35), inset 0 1px 0 rgba(255,255,255,.25);
}

.btn-danger{
  background:rgba(239,68,68,.08);
  border:1px solid rgba(239,68,68,.22);
  color:#f87171;
}
.btn-danger:hover{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.45)}

.btn-wa{background:#25D366;color:#fff;border:none;font-weight:800}
.btn-wa:hover{background:#1fba59;box-shadow:0 4px 22px rgba(37,211,102,.35)}

/* ════════════════════════════════════
   TABS
════════════════════════════════════ */
.main-tabs{
  position:sticky;top:64px;z-index:99;
  background: linear-gradient(180deg,
    rgba(7,7,15,.80) 0%,
    rgba(10,10,22,.72) 100%);
  border-bottom: 1px solid rgba(255,255,255,.08);
  box-shadow: 0 4px 24px rgba(0,0,0,.25),
              inset 0 1px 0 rgba(255,255,255,.06);
}
.tabs-inner{
  max-width:1160px;margin:0 auto;
  padding:0 28px;
  display:flex;gap:0;
  overflow-x:auto;scrollbar-width:none;
}
.tabs-inner::-webkit-scrollbar{display:none}
.tab-btn{
  flex-shrink:0;display:flex;align-items:center;gap:7px;
  padding:14px 20px;
  background: transparent;
  border: none;
  color:var(--text-dim);font-size:12px;font-weight:700;
  border-bottom:2px solid transparent;
  transition: transform .3s cubic-bezier(.34,1.12,.64,1), box-shadow .3s cubic-bezier(.34,1.12,.64,1), background .3s cubic-bezier(.34,1.12,.64,1), border-color .3s cubic-bezier(.34,1.12,.64,1), color .3s cubic-bezier(.34,1.12,.64,1), opacity .3s cubic-bezier(.34,1.12,.64,1);
  white-space:nowrap;position:relative;
  border-radius: 0;
}
.tab-btn::before {
  content:'';
  position:absolute;inset:6px 4px;
  background: transparent;
  border-radius: 10px;
  transition: transform .3s cubic-bezier(.34,1.12,.64,1), box-shadow .3s cubic-bezier(.34,1.12,.64,1), background .3s cubic-bezier(.34,1.12,.64,1), border-color .3s cubic-bezier(.34,1.12,.64,1), color .3s cubic-bezier(.34,1.12,.64,1), opacity .3s cubic-bezier(.34,1.12,.64,1);
  z-index:-1;
}
.tab-btn::after{
  content:'';
  position:absolute;bottom:-1px;left:10%;right:10%;
  height:2px;
  background: linear-gradient(90deg, rgba(201,162,39,.5), var(--gold), rgba(201,162,39,.5));
  border-radius:2px 2px 0 0;
  transform:scaleX(0);transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  transform-origin:center;
  box-shadow: 0 0 8px rgba(201,162,39,.4);
}
.tab-btn:hover {
  color:var(--text-soft);
}
.tab-btn:hover::before {
  background: rgba(255,255,255,.05);
  
}
.tab-btn.active{
  color:var(--gold);
  transform: translateY(-2px);
}
.tab-btn.active::before {
  background: linear-gradient(135deg,
    rgba(201,162,39,.15) 0%,
    rgba(255,255,255,.06) 50%,
    rgba(201,162,39,.08) 100%);
  border: 1px solid rgba(201,162,39,.20);
  box-shadow: 0 3px 0 -1px rgba(0,0,0,.3), 0 6px 16px -2px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.12);
}
.tab-btn.active::after{transform:scaleX(1)}
.tab-btn .tab-icon{font-size:15px;line-height:1}

.tab-panel{display:none}
.tab-panel.active{
  display:block;
  animation:panelIn .48s cubic-bezier(.34,1.12,.64,1) both;
}
@keyframes panelIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* ════════════════════════════════════
   HERO
════════════════════════════════════ */
.hero{
  text-align:center;padding:68px 24px 52px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;
  inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(201,162,39,.06) 0%,transparent 70%);
  pointer-events:none;
}
.hero-logo-wrap{
  position:relative;display:inline-block;margin-bottom:28px;
}
.hero-glow{
  position:absolute;inset:-36px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,162,39,.18) 0%,transparent 65%);
  animation:heroGlowPulse 3.5s ease-in-out infinite;
  will-change:transform,opacity;
}
@keyframes heroGlowPulse{
  0%,100%{opacity:.45;transform:scale(1)}
  50%{opacity:.9;transform:scale(1.1)}
}
.hero-svg{filter:drop-shadow(0 0 28px rgba(201,162,39,.42));display:block}

.hero-eyebrow{
  display:inline-flex;align-items:center;gap:7px;
  padding:5px 16px;border-radius:99px;
  background: linear-gradient(135deg, rgba(201,162,39,.16) 0%, rgba(201,162,39,.06) 100%);
  border: 1px solid rgba(201,162,39,.28);
  box-shadow: 0 4px 20px rgba(201,162,39,.12), inset 0 1px 0 rgba(255,255,255,.12);
  color:var(--gold);font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  margin-bottom:14px;
  animation:heroFadeUp .6s var(--ease-out) .05s both;
}
.hero-eyebrow::before{
  content:'';width:5px;height:5px;border-radius:50%;
  background:var(--gold);animation:pulse 2s infinite;flex-shrink:0;
}
.hero-title{
  font-size:clamp(30px,5.5vw,50px);font-weight:900;
  color:#fff;letter-spacing:.5px;
  animation:heroFadeUp .7s var(--ease-out) .12s both;
  line-height:1.15;
}
.hero-subtitle{
  font-size:11px;color:var(--gold);font-weight:700;
  letter-spacing:3px;text-transform:uppercase;
  margin:6px 0 12px;
  animation:heroFadeUp .7s var(--ease-out) .2s both;
  opacity:.8;
}
.hero-desc{
  font-size:12.5px;color:var(--text-dim);line-height:1.75;
  max-width:440px;margin:0 auto 36px;
  animation:heroFadeUp .7s var(--ease-out) .28s both;
}
@keyframes heroFadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
.hero-divider{
  width:160px;height:1px;margin:0 auto;
  background:linear-gradient(90deg,transparent,rgba(201,162,39,.45),transparent);
}

/* ════════════════════════════════════
   TRENDING SECTION
════════════════════════════════════ */
.trending-section{margin-bottom:32px;animation:panelIn .5s var(--ease-out) both}
.trending-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.trending-header h3{font-size:11.5px;font-weight:800;color:#fff;letter-spacing:.4px}
.fire{font-size:17px;animation:firePulse 1.4s ease-in-out infinite}
@keyframes firePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.22)}}

.trending-bar{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
.trending-bar::-webkit-scrollbar{display:none}

.trending-chip{
  flex-shrink:0;display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:18px;
  background: linear-gradient(135deg,
    rgba(255,255,255,.08) 0%,
    rgba(12,12,26,.75) 50%,
    rgba(201,162,39,.06) 100%);
  border: 1px solid rgba(255,255,255,.12);
  cursor:pointer;
  transition: transform .35s cubic-bezier(.34,1.12,.64,1), box-shadow .35s cubic-bezier(.34,1.12,.64,1), background .35s cubic-bezier(.34,1.12,.64,1), border-color .35s cubic-bezier(.34,1.12,.64,1), color .35s cubic-bezier(.34,1.12,.64,1), opacity .35s cubic-bezier(.34,1.12,.64,1);
  max-width:230px;
  box-shadow: 0 4px 16px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.10);
  position: relative;
}
.trending-chip:hover{
  background: linear-gradient(135deg,
    rgba(255,255,255,.13) 0%,
    rgba(12,12,26,.70) 50%,
    rgba(201,162,39,.12) 100%);
  border-color: rgba(201,162,39,.40);
  transform: translateY(-3px) scale(1.02);
  box-shadow:
    0 14px 36px rgba(0,0,0,.45),
    0 0 20px rgba(201,162,39,.15),
    inset 0 1px 0 rgba(255,255,255,.18);
}
.trending-rank{
  width:23px;height:23px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;
}
.rank-1{background:linear-gradient(135deg,#f5d06a,#c9a227);color:#000}
.rank-2{background:linear-gradient(135deg,#d4d4d4,#909090);color:#000}
.rank-3{background:linear-gradient(135deg,#e0894e,#9c4f18);color:#fff}
.rank-other{background:var(--ink-3);color:var(--text-dim)}

.trending-chip-img{
  width:38px;height:38px;border-radius:9px;
  object-fit:cover;flex-shrink:0;
  border:1px solid var(--border);
}
.trending-chip-info{min-width:0;flex:1}
.trending-chip-title{
  font-size:11px;font-weight:700;color:#ddd;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.trending-chip-likes{font-size:9.5px;color:var(--like);font-weight:700;margin-top:2px}

/* ════════════════════════════════════
   SEARCH & FILTERS
════════════════════════════════════ */
.search-section{margin-bottom:26px}
.search-wrap{position:relative;margin-bottom:14px}
.search-input{
  width:100%;
  background: linear-gradient(135deg,
    rgba(255,255,255,.07) 0%,
    rgba(10,10,22,.80) 50%,
    rgba(255,255,255,.04) 100%);
  border: 1px solid rgba(255,255,255,.12);
  box-shadow: 0 4px 20px rgba(0,0,0,.20), inset 0 1px 0 rgba(255,255,255,.09);
  border-radius:var(--r-lg);
  padding:14px 52px 14px 20px;
  color:var(--text);font-size:13px;
  transition: transform .32s cubic-bezier(.34,1.12,.64,1), box-shadow .32s cubic-bezier(.34,1.12,.64,1), background .32s cubic-bezier(.34,1.12,.64,1), border-color .32s cubic-bezier(.34,1.12,.64,1), color .32s cubic-bezier(.34,1.12,.64,1), opacity .32s cubic-bezier(.34,1.12,.64,1);
  outline:none;caret-color:var(--gold);
}
.search-input:focus{
  border-color: rgba(201,162,39,.45);
  background: linear-gradient(135deg,
    rgba(255,255,255,.10) 0%,
    rgba(10,10,22,.76) 50%,
    rgba(201,162,39,.06) 100%);
  box-shadow:
    0 0 0 3px rgba(201,162,39,.10),
    0 8px 32px rgba(0,0,0,.30),
    inset 0 1px 0 rgba(255,255,255,.14);
}
.search-input::placeholder{color:var(--text-dim)}
.search-icon{
  position:absolute;right:18px;top:50%;transform:translateY(-50%);
  color:var(--text-dim);pointer-events:none;transition:color .2s;
}
.search-input:focus~.search-icon{color:var(--gold)}

.filter-bar{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{
  flex-shrink:0;padding:6px 16px;border-radius:99px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.14);
  color:var(--text-dim);font-size:11px;font-weight:600;
  transition: transform .15s cubic-bezier(.22,1,.36,1), box-shadow .2s ease, background .2s, border-color .2s, color .2s;
  white-space:nowrap;
  box-shadow: 0 2px 0 rgba(0,0,0,.25);
}
.filter-chip:hover{
  background: rgba(201,162,39,.15);
  border-color: rgba(201,162,39,.35);
  color:var(--gold);
  transform: translateY(-1px);
}
.filter-chip:active{
  transform: translateY(2px) scale(.96);
  box-shadow: 0 0 0 rgba(0,0,0,.25);
}
.filter-chip.active{
  background: linear-gradient(135deg, rgba(201,162,39,.90) 0%, rgba(245,208,106,.82) 100%);
  border-color: rgba(255,255,255,.20);
  color:var(--ink);font-weight:800;
  box-shadow: 0 3px 0 rgba(140,105,15,.5), 0 6px 14px rgba(201,162,39,.30);
}

/* ════════════════════════════════════
   CARDS GRID
════════════════════════════════════ */
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
  gap:22px;
  perspective:1400px;
}
.prompt-card{
  background: linear-gradient(160deg, rgba(255,255,255,.12) 0%, rgba(255,255,255,.05) 100%);
  border: 1px solid rgba(255,255,255,.22);
  border-radius: var(--r-xl);
  overflow:hidden;
  display:flex;flex-direction:column;
  transition: transform .38s cubic-bezier(.22,1.4,.36,1), box-shadow .38s ease;
  animation:cardIn .45s var(--ease-out) both;
  /* ظلال متعددة الطبقات — تعطي عمق ثلاثي الأبعاد دائم بدون الحاجة لأي تفاعل */
  box-shadow:
    0 1px 0 rgba(255,255,255,.25) inset,
    0 2px 0 rgba(0,0,0,.35),
    0 6px 0 -1px rgba(0,0,0,.28),
    0 10px 18px -4px rgba(0,0,0,.55),
    0 22px 40px -10px rgba(0,0,0,.45);
  position: relative;
  transform-style: preserve-3d;
  will-change: transform;
  transform: perspective(1400px) translateZ(0);
}
.prompt-card::after {
  content:'';
  position: absolute;
  top:0; left:0; right:0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.40) 40%, rgba(201,162,39,.20) 70%, transparent);
  pointer-events: none;
  z-index: 2;
}
.prompt-card:hover{
  border-color: rgba(201,162,39,.45);
  transform: perspective(1400px) translateY(-4px) translateZ(14px);
  box-shadow:
    0 1px 0 rgba(255,255,255,.3) inset,
    0 2px 0 rgba(0,0,0,.35),
    0 8px 0 -1px rgba(0,0,0,.3),
    0 16px 26px -6px rgba(0,0,0,.55),
    0 0 24px rgba(201,162,39,.15),
    0 30px 50px -12px rgba(0,0,0,.5);
}
/* حالة الضغط باللمس — البطاقة تنبرز للأمام بوضوح مع ميلان خفيف عشوائي */
.prompt-card.is-pressed{
  transition: transform .12s cubic-bezier(.22,1,.36,1), box-shadow .12s ease;
  border-color: rgba(201,162,39,.55);
  transform: perspective(1000px) rotateX(var(--tiltX,0deg)) rotateY(var(--tiltY,0deg)) scale(1.045) translateZ(34px);
  box-shadow:
    0 1px 0 rgba(255,255,255,.35) inset,
    0 3px 0 rgba(0,0,0,.4),
    0 14px 0 -2px rgba(0,0,0,.35),
    0 24px 40px -8px rgba(0,0,0,.65),
    0 0 34px rgba(201,162,39,.30),
    0 40px 65px -12px rgba(0,0,0,.6);
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

.card-media{
  position:relative;overflow:hidden;
  background:var(--ink-3);cursor:pointer;
  /* ارتفاع ديناميكي — يتكيف مع نسبة الصورة */
  min-height:160px;
  max-height:420px;
}
/* صور أفقية — الارتفاع الافتراضي */
.card-media.is-landscape{height:210px;}
/* صور عمودية 9:16 — تظهر كاملة */
.card-media.is-portrait{height:auto;}
.card-media.is-portrait img{
  height:auto!important;
  object-fit:contain!important;
  background:var(--ink-3);
}
.card-media img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .75s var(--ease-out);
  display:block;
}
.prompt-card:hover .card-media.is-landscape img{transform:scale(1.09)}
.card-media-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(10,10,22,.98) 0%,rgba(10,10,22,.22) 42%,transparent 70%);
}
.card-badge{
  position:absolute;top:11px;right:11px;
  padding:4px 12px;border-radius:99px;
  background:rgba(7,7,15,.78);
  border:1px solid rgba(255,255,255,.09);
  color:rgba(255,255,255,.8);font-size:9.5px;font-weight:700;
  letter-spacing:.3px;
}
.card-hot{
  position:absolute;top:11px;left:11px;
  padding:4px 11px;border-radius:99px;
  background:rgba(220,40,60,.82);
  border:1px solid rgba(255,100,120,.28);
  color:#fff;font-size:9px;font-weight:800;
  
  display:flex;align-items:center;gap:5px;
}
.card-media-play{
  position:absolute;bottom:12px;left:12px;
  width:32px;height:32px;border-radius:50%;
  background:rgba(201,162,39,.18);
  border:1px solid rgba(201,162,39,.4);
  display:flex;align-items:center;justify-content:center;
  color:var(--gold);opacity:0;
  transition:opacity .25s,transform .25s var(--ease-spring);
  transform:scale(.8);
}
.prompt-card:hover .card-media-play{opacity:1;transform:scale(1)}

/* شارة نسبة أبعاد الصورة — تظهر تلقائياً فوق كل صورة (16:9, 9:16, 4:3...) */
.ratio-badge{
  position:absolute;bottom:11px;right:11px;z-index:3;
  padding:4px 10px;border-radius:99px;
  background:rgba(7,7,15,.80);
  border:1px solid rgba(201,162,39,.35);
  color:var(--gold-l);font-size:9px;font-weight:800;
  letter-spacing:.4px;
  pointer-events:none;
  font-variant-numeric:tabular-nums;
}
.detail-media .ratio-badge{bottom:14px;right:14px;font-size:10px}

.card-body{
  padding:18px;flex-grow:1;
  display:flex;flex-direction:column;gap:11px;
}
.card-title{
  font-size:14px;font-weight:800;color:#eaeaf5;
  line-height:1.4;
  overflow:hidden;display:-webkit-box;
  -webkit-line-clamp:1;-webkit-box-orient:vertical;
  transition:color .2s;
}
.prompt-card:hover .card-title{color:var(--gold-l)}

.card-preview{
  background:rgba(0,0,0,.28);
  border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;flex-grow:1;
}
.card-preview p{
  font-size:10.5px;color:var(--text-dim);
  line-height:1.75;font-style:italic;
  overflow:hidden;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;
}

.card-actions{display:flex;gap:8px}
.card-copy{
  flex:1;padding:10px 12px;border-radius:11px;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  border:none;color:var(--ink);font-size:11px;font-weight:800;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition: transform .22s var(--ease-out), box-shadow .22s var(--ease-out), background .22s var(--ease-out), border-color .22s var(--ease-out), color .22s var(--ease-out), opacity .22s var(--ease-out);
}
.card-copy:hover{
  box-shadow:0 5px 20px rgba(201,162,39,.42);
  transform:translateY(-1px);
}
.card-copy:active{transform:scale(.95)}
.card-eye{
  padding:10px;border-radius:11px;
  background:var(--ink-3);border:1px solid var(--border);
  color:var(--text-dim);
  display:flex;align-items:center;justify-content:center;
  transition: transform .2s var(--ease-out), box-shadow .2s var(--ease-out), background .2s var(--ease-out), border-color .2s var(--ease-out), color .2s var(--ease-out), opacity .2s var(--ease-out);
}
.card-eye:hover{border-color:var(--border-gold);color:var(--gold);background:var(--gold-d)}

.card-social{
  display:flex;align-items:center;gap:8px;
  padding-top:7px;border-top:1px solid var(--border);
}
.like-btn{
  display:flex;align-items:center;gap:5px;
  padding:6px 13px;border-radius:99px;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.12);
  color:var(--text-dim);font-size:11px;font-weight:700;
  transition: transform .22s ease, box-shadow .22s ease, background .22s ease, border-color .22s ease, color .22s ease, opacity .22s ease;
}
.like-btn:hover{
  border-color:rgba(255,79,106,.40);
  color:var(--like);
  background: rgba(255,79,106,.12);
  transform: translateY(-1px);
}
.like-btn.liked{
  border-color:rgba(255,79,106,.45);color:var(--like);
  background: rgba(255,79,106,.15);
}
.like-btn.liked .like-heart{animation:heartPop .35s var(--ease-spring)}
@keyframes heartPop{0%{transform:scale(1)}50%{transform:scale(1.55)}100%{transform:scale(1)}}
.like-heart{font-size:13px;line-height:1}
.like-count{font-size:11px}

.comment-btn{
  display:flex;align-items:center;gap:5px;
  padding:6px 13px;border-radius:99px;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.12);
  color:var(--text-dim);font-size:11px;font-weight:700;
  transition: transform .22s ease, box-shadow .22s ease, background .22s ease, border-color .22s ease, color .22s ease, opacity .22s ease;
}
.comment-btn:hover{
  border-color:rgba(201,162,39,.38);
  color:var(--gold);
  background: rgba(201,162,39,.12);
  transform: translateY(-1px);
}
.comment-count{font-size:11px}

/* ════════════════════════════════════
   STATS PANEL (Admin)
════════════════════════════════════ */
.stats-panel{
  background:var(--ink-1);
  border:1px solid var(--border-gold);
  border-radius:var(--r-xl);
  padding:24px;margin-bottom:32px;
  animation:cardIn .5s var(--ease-out) both;
  position:relative;overflow:hidden;
}
.stats-panel::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% -20%,rgba(201,162,39,.06) 0%,transparent 70%);
  pointer-events:none;
}
.stats-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;padding-bottom:16px;
  border-bottom:1px solid var(--border);
}
.stats-title{font-size:11px;font-weight:800;color:var(--gold);letter-spacing:.8px;text-transform:uppercase}
.stats-connected{
  font-size:9px;color:var(--green);
  background:rgba(34,197,94,.07);
  border:1px solid rgba(34,197,94,.18);
  padding:3px 11px;border-radius:99px;font-weight:700;
}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.stat-box{
  background: linear-gradient(145deg,
    rgba(255,255,255,.06) 0%,
    rgba(0,0,0,.55) 60%,
    rgba(201,162,39,.04) 100%);
  border: 1px solid rgba(255,255,255,.09);
  box-shadow: 0 4px 18px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.07);
  border-radius:14px;padding:18px 14px;text-align:center;
  transition: transform .32s cubic-bezier(.34,1.12,.64,1), box-shadow .32s cubic-bezier(.34,1.12,.64,1), background .32s cubic-bezier(.34,1.12,.64,1), border-color .32s cubic-bezier(.34,1.12,.64,1), color .32s cubic-bezier(.34,1.12,.64,1), opacity .32s cubic-bezier(.34,1.12,.64,1);
  position:relative;overflow:hidden;
}
.stat-box:hover{
  border-color: rgba(201,162,39,.30);
  background: linear-gradient(145deg,
    rgba(255,255,255,.09) 0%,
    rgba(0,0,0,.50) 60%,
    rgba(201,162,39,.08) 100%);
  box-shadow: 0 10px 32px rgba(0,0,0,.40), inset 0 1px 0 rgba(255,255,255,.12);
  transform: translateY(-2px);
}
.stat-label{font-size:9.5px;color:var(--text-dim);font-weight:600;margin-bottom:8px;letter-spacing:.2px}
.stat-num{
  font-size:30px;font-weight:900;
  font-variant-numeric:tabular-nums;
  color:#fff;line-height:1;
}
.stat-num.gold{color:var(--gold)}
.stat-num.red{color:var(--like)}

/* ════════════════════════════════════
   LATMIYA AUDIO CONTROL (Admin)
════════════════════════════════════ */
.audio-panel{
  margin-top:20px;padding-top:20px;
  border-top:1px solid var(--border);
}
.audio-panel-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;flex-wrap:wrap;gap:8px;
}
.audio-panel-title{
  font-size:10.5px;font-weight:800;color:var(--gold);
  letter-spacing:.5px;display:flex;align-items:center;gap:7px;
}
.audio-status-chip{
  font-size:9px;font-weight:700;padding:3px 11px;border-radius:99px;
  display:inline-flex;align-items:center;gap:5px;
}
.audio-status-chip.on{
  color:var(--green);
  background: linear-gradient(135deg, rgba(34,197,94,.14) 0%, rgba(34,197,94,.06) 100%);
  
  border:1px solid rgba(34,197,94,.28);
  box-shadow: 0 2px 10px rgba(34,197,94,.10), inset 0 1px 0 rgba(255,255,255,.08);
}
.audio-status-chip.off{
  color:var(--text-dim);
  background: linear-gradient(135deg, rgba(255,255,255,.05) 0%, rgba(255,255,255,.02) 100%);
  
  border:1px solid rgba(255,255,255,.09);
}
.audio-row{
  display:flex;align-items:center;gap:12px;
  background: linear-gradient(135deg, rgba(255,255,255,.06) 0%, rgba(0,0,0,.55) 60%, rgba(201,162,39,.04) 100%);
  border: 1px solid rgba(255,255,255,.09);
  box-shadow: 0 3px 14px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.07);
  border-radius:13px;padding:13px 15px;margin-bottom:12px;
}
.audio-row-icon{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  background:var(--gold-d);border:1px solid var(--border-gold);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
}
.audio-row-info{flex:1;min-width:0}
.audio-row-name{
  font-size:11.5px;font-weight:700;color:#ddd;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}
.audio-row-sub{font-size:9.5px;color:var(--text-dim);margin-top:2px}
.audio-volume-row{display:flex;align-items:center;gap:11px;margin-bottom:4px}
.audio-volume-icon{color:var(--gold);flex-shrink:0;display:flex}
.audio-volume-slider{
  flex:1;height:5px;border-radius:99px;
  background:rgba(255,255,255,.08);
  outline:none;-webkit-appearance:none;appearance:none;
  cursor:pointer;
}
.audio-volume-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:17px;height:17px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  cursor:pointer;border:2px solid var(--ink);
  box-shadow:0 2px 8px rgba(201,162,39,.4);
  transition:transform .15s var(--ease-spring);
}
.audio-volume-slider::-webkit-slider-thumb:hover{transform:scale(1.15)}
.audio-volume-slider::-moz-range-thumb{
  width:17px;height:17px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  cursor:pointer;border:2px solid var(--ink);
}
.audio-volume-num{
  font-size:11px;font-weight:800;color:var(--gold);
  min-width:32px;text-align:left;font-variant-numeric:tabular-nums;
}
.audio-actions{display:flex;gap:8px;margin-top:12px}

.admin-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:99px;
  background: linear-gradient(135deg, rgba(201,162,39,.18) 0%, rgba(201,162,39,.08) 100%);
  border: 1px solid rgba(201,162,39,.30);
  box-shadow: 0 2px 12px rgba(201,162,39,.12), inset 0 1px 0 rgba(255,255,255,.12);
  color:var(--gold);font-size:10px;font-weight:800;letter-spacing:.35px;
}
.badge-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--gold);animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.75)}}

/* ════════════════════════════════════
   LOADING / EMPTY
════════════════════════════════════ */
.loader{text-align:center;padding:90px 16px}
.spinner{
  width:38px;height:38px;border-radius:50%;
  border:2.5px solid var(--gold-d2);
  border-top-color:var(--gold);
  animation:spin .75s linear infinite;
  margin:0 auto 18px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:11px;color:var(--text-dim);margin-top:4px}

.empty-state{text-align:center;padding:70px 16px}
.empty-icon{
  width:72px;height:72px;border-radius:50%;
  background:var(--gold-d);border:1px solid var(--border-gold);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
}
.empty-title{font-size:15px;color:#a0a0b5;font-weight:700;margin-bottom:8px}
.empty-sub{font-size:11.5px;color:var(--text-dim);line-height:1.65}

.meta-bar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.count-label{font-size:11px;color:var(--text-dim);font-weight:600}

/* ───── معرض الأعمال (Portfolio) ───── */
.portfolio-grid{
  columns:150px 4;
  column-gap:12px;
  perspective:1200px;
}
.portfolio-item{
  position:relative;
  break-inside:avoid;
  margin-bottom:12px;
  border-radius:var(--r);
  overflow:hidden;
  background:var(--ink-1);
  border:1px solid var(--border);
  cursor:pointer;
  animation:cardIn .5s var(--ease-out) both;
  transition:transform .38s cubic-bezier(.22,1.4,.36,1), box-shadow .38s ease, border-color .3s;
  display:flex;
  transform-style:preserve-3d;
  will-change:transform;
  transform: perspective(1200px) translateZ(0);
  box-shadow:
    0 1px 0 rgba(255,255,255,.18) inset,
    0 2px 0 rgba(0,0,0,.35),
    0 5px 0 -1px rgba(0,0,0,.28),
    0 8px 16px -4px rgba(0,0,0,.5);
}
.portfolio-item:hover{
  transform: perspective(1200px) translateY(-3px) translateZ(10px);
  border-color:rgba(201,162,39,.4);
  box-shadow:
    0 1px 0 rgba(255,255,255,.22) inset,
    0 2px 0 rgba(0,0,0,.35),
    0 6px 0 -1px rgba(0,0,0,.3),
    0 14px 28px -6px rgba(0,0,0,.55);
}
.portfolio-item.is-pressed{
  transition: transform .12s cubic-bezier(.22,1,.36,1), box-shadow .12s ease;
  border-color:rgba(201,162,39,.55);
  transform: perspective(900px) rotateX(var(--tiltX,0deg)) rotateY(var(--tiltY,0deg)) scale(1.06) translateZ(30px);
  box-shadow:
    0 1px 0 rgba(255,255,255,.3) inset,
    0 3px 0 rgba(0,0,0,.4),
    0 12px 0 -2px rgba(0,0,0,.35),
    0 22px 38px -8px rgba(0,0,0,.6),
    0 0 28px rgba(201,162,39,.28);
  box-shadow:0 14px 36px rgba(0,0,0,.5);
}
.portfolio-item img{
  width:100%;height:auto;display:block;object-fit:contain;
  transition:transform .5s var(--ease-out);
}
.portfolio-item:hover img{transform:scale(1.05)}
.portfolio-item .ratio-badge{bottom:8px;right:8px;font-size:8.5px;padding:3px 8px}
.portfolio-del{
  position:absolute;top:8px;left:8px;z-index:2;
  width:26px;height:26px;border-radius:7px;
  background:rgba(7,7,15,.87);
  border:1px solid rgba(239,68,68,.38);
  color:#f87171;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s,background .2s;
}
.portfolio-item:hover .portfolio-del{opacity:1}
.portfolio-del:hover{background:rgba(239,68,68,.22)}

/* ════════════════════════════════════
   COMMENTS MODAL
════════════════════════════════════ */
.comments-list{
  display:flex;flex-direction:column;gap:13px;
  margin-bottom:18px;max-height:340px;overflow-y:auto;
  padding-right:2px;
}
.comment-item{display:flex;gap:11px;align-items:flex-start}
.comment-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:var(--gold-d);border:1px solid var(--border-gold);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
}
.comment-body{flex:1;min-width:0}
.comment-name{font-size:10px;font-weight:800;color:var(--gold);margin-bottom:4px}
.comment-text{font-size:12px;color:var(--text-soft);line-height:1.65;word-break:break-word}
.comment-time{font-size:9px;color:var(--text-dim);margin-top:4px}
.comment-input-row{display:flex;gap:8px;align-items:flex-end}
.comment-input{
  flex:1;
  background: linear-gradient(135deg, rgba(255,255,255,.06) 0%, rgba(0,0,0,.55) 100%);
  border: 1px solid rgba(255,255,255,.10);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 2px 10px rgba(0,0,0,.20);
  border-radius:12px;padding:10px 14px;color:var(--text);
  font-size:12px;outline:none;resize:none;caret-color:var(--gold);
  line-height:1.55;max-height:80px;
  transition: transform .30s cubic-bezier(.34,1.12,.64,1), box-shadow .30s cubic-bezier(.34,1.12,.64,1), background .30s cubic-bezier(.34,1.12,.64,1), border-color .30s cubic-bezier(.34,1.12,.64,1), color .30s cubic-bezier(.34,1.12,.64,1), opacity .30s cubic-bezier(.34,1.12,.64,1);
}
.comment-input:focus{
  border-color: rgba(201,162,39,.42);
  background: linear-gradient(135deg, rgba(255,255,255,.09) 0%, rgba(0,0,0,.50) 100%);
  box-shadow: 0 0 0 3px rgba(201,162,39,.10), 0 4px 16px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.10);
}
.comment-input::placeholder{color:var(--text-dim)}
.comment-name-input{
  width:100%;
  background: linear-gradient(135deg, rgba(255,255,255,.06) 0%, rgba(0,0,0,.55) 100%);
  border: 1px solid rgba(255,255,255,.10);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
  border-radius:10px;
  padding:9px 13px;color:var(--text);font-size:12px;
  outline:none;caret-color:var(--gold);margin-bottom:9px;
  transition: transform .28s cubic-bezier(.34,1.12,.64,1), box-shadow .28s cubic-bezier(.34,1.12,.64,1), background .28s cubic-bezier(.34,1.12,.64,1), border-color .28s cubic-bezier(.34,1.12,.64,1), color .28s cubic-bezier(.34,1.12,.64,1), opacity .28s cubic-bezier(.34,1.12,.64,1);
}
.comment-name-input:focus{
  border-color: rgba(201,162,39,.40);
  box-shadow: 0 0 0 3px rgba(201,162,39,.09), inset 0 1px 0 rgba(255,255,255,.10);
}
.comment-name-input::placeholder{color:var(--text-dim)}
.comments-empty{text-align:center;padding:30px 16px;color:var(--text-dim);font-size:12px}

/* ════════════════════════════════════
   PHOTO SERVICES
════════════════════════════════════ */
.section-header{display:flex;align-items:center;gap:15px;margin-bottom:30px}
.section-header h2{font-size:21px;font-weight:900;color:#fff;white-space:nowrap}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(201,162,39,.38),transparent)}
.section-badge{
  font-size:9px;padding:4px 13px;border-radius:99px;
  border:1px solid var(--border-gold);color:var(--gold);
  white-space:nowrap;font-weight:700;flex-shrink:0;letter-spacing:.2px;
}

.services-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:22px}
.service-card{
  background:var(--ink-1);border:1px solid var(--border);
  border-radius:var(--r-xl);padding:26px 24px;
  position:relative;overflow:hidden;
  transition:border-color .3s,transform .35s var(--ease-spring),box-shadow .3s;
  animation:cardIn .5s var(--ease-out) both;
}
.service-card::before{
  content:'';position:absolute;top:0;right:0;
  width:140px;height:140px;
  background:radial-gradient(circle at top right,rgba(201,162,39,.06) 0%,transparent 65%);
  pointer-events:none;
}
.service-card:hover{
  border-color:rgba(201,162,39,.38);
  transform:translateY(-5px);
  box-shadow:0 20px 60px rgba(0,0,0,.55),var(--shadow-gold);
}
.service-card.featured{border-color:rgba(201,162,39,.26)}
.service-emoji{font-size:36px;margin-bottom:16px}
.service-name{font-size:15px;font-weight:800;color:#fff;margin-bottom:9px;line-height:1.3}
.service-detail{font-size:12px;color:var(--text-dim);margin-bottom:18px;line-height:1.7}
.service-price{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 18px;border-radius:11px;
  background:var(--gold-d);border:1px solid var(--border-gold);
  color:var(--gold);font-size:14.5px;font-weight:900;margin-bottom:18px;
}
.service-features{display:flex;flex-direction:column;gap:7px;margin-bottom:20px}
.service-feature{
  display:flex;align-items:center;gap:9px;
  font-size:11px;color:#8a8a9e;
}
.service-feature::before{content:'✅';font-size:10.5px}

/* ════════════════════════════════════
   GALLERY
════════════════════════════════════ */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(215px,1fr));
  gap:16px;
}
.gallery-item{
  position:relative;border-radius:var(--r);
  overflow:hidden;aspect-ratio:4/3;
  background: rgba(12,12,26,.85);
  border: 1px solid rgba(255,255,255,.10);
  box-shadow: 0 4px 18px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.07);
  cursor:pointer;
  transition: transform .38s cubic-bezier(.34,1.12,.64,1), box-shadow .38s cubic-bezier(.34,1.12,.64,1), background .38s cubic-bezier(.34,1.12,.64,1), border-color .38s cubic-bezier(.34,1.12,.64,1), color .38s cubic-bezier(.34,1.12,.64,1), opacity .38s cubic-bezier(.34,1.12,.64,1);
}
.gallery-item:hover{
  transform:scale(1.04);
  box-shadow:
    0 20px 56px rgba(0,0,0,.65),
    0 0 24px rgba(201,162,39,.12),
    inset 0 1px 0 rgba(255,255,255,.14);
  border-color:rgba(201,162,39,.40);
}
.gallery-item img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .55s var(--ease-out);
}
.gallery-item:hover img{transform:scale(1.1)}
.gallery-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(7,7,15,.9) 0%,transparent 55%);
  opacity:0;transition:opacity .3s;
  display:flex;align-items:flex-end;padding:13px;
}
.gallery-item:hover .gallery-overlay{opacity:1}
.gallery-label{font-size:10.5px;font-weight:700;color:#fff}
.gallery-del{
  position:absolute;top:8px;right:8px;z-index:2;
  width:30px;height:30px;border-radius:8px;
  background: linear-gradient(135deg, rgba(7,7,15,.88) 0%, rgba(30,0,0,.75) 100%);
  border: 1px solid rgba(239,68,68,.35);
  box-shadow: 0 4px 14px rgba(0,0,0,.40), inset 0 1px 0 rgba(255,255,255,.08);
  color:#f87171;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition: transform .28s cubic-bezier(.34,1.12,.64,1), box-shadow .28s cubic-bezier(.34,1.12,.64,1), background .28s cubic-bezier(.34,1.12,.64,1), border-color .28s cubic-bezier(.34,1.12,.64,1), color .28s cubic-bezier(.34,1.12,.64,1), opacity .28s cubic-bezier(.34,1.12,.64,1);
}
.gallery-item:hover .gallery-del{opacity:1}
.gallery-del:hover{
  background: linear-gradient(135deg, rgba(239,68,68,.25) 0%, rgba(239,68,68,.10) 100%);
  border-color: rgba(239,68,68,.55);
  transform: scale(1.10);
  box-shadow: 0 6px 18px rgba(239,68,68,.25);
}

.gallery-placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  aspect-ratio:4/3;background:var(--ink-1);
  border:1px dashed rgba(201,162,39,.18);
  border-radius:var(--r);color:var(--text-dim);font-size:11px;gap:8px;
}

.upload-card{
  background:var(--ink-1);border:1px solid var(--border-gold);
  border-radius:var(--r-xl);padding:22px;margin-bottom:26px;
  box-shadow:0 2px 0 rgba(0,0,0,.3), 0 8px 20px -6px rgba(0,0,0,.4);
}
.drop-zone{
  border:2px dashed rgba(201,162,39,.28);
  border-radius:13px;padding:26px 16px;
  text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;
  background:rgba(0,0,0,.18);margin-bottom:12px;
}
.drop-zone:hover,.drop-zone.drag-over{
  border-color:var(--gold);background:var(--gold-d);
}
.drop-zone-icon{font-size:32px;margin-bottom:9px}
.drop-zone-title{font-size:12px;font-weight:700;color:#ccc;margin-bottom:4px}
.drop-zone-sub{font-size:10px;color:var(--text-dim)}
.preview-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px}

/* ════════════════════════════════════
   GUIDE / TOOLS
════════════════════════════════════ */
.steps-card{
  background:var(--ink-1);border:1px solid rgba(201,162,39,.13);
  border-radius:var(--r-xl);padding:26px;margin-bottom:30px;
}
.steps-title{font-size:11px;font-weight:800;color:var(--gold);margin-bottom:20px;letter-spacing:.6px}
.step-row{
  display:flex;align-items:flex-start;gap:15px;
  padding:15px 0;border-bottom:1px solid var(--border);
}
.step-row:last-child{border-bottom:none;padding-bottom:0}
.step-num{
  width:34px;height:34px;flex-shrink:0;border-radius:50%;
  background:var(--gold-d);border:1px solid var(--border-gold);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:var(--gold);
}
.step-content strong{display:block;font-size:13px;color:#ddd;font-weight:800;margin-bottom:5px}
.step-content p{font-size:11.5px;color:var(--text-dim);line-height:1.7}
.step-code{
  margin-top:11px;background:rgba(0,0,0,.5);
  border:1px solid var(--border);border-radius:10px;
  padding:13px 17px;font-size:11px;color:#9090b8;
  line-height:1.7;direction:ltr;text-align:left;
}

.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
.tool-card{
  background: rgba(255,255,255,.10);
  border: 1px solid rgba(255,255,255,.20);
  border-radius:var(--r-xl);padding:22px;
  display:flex;flex-direction:column;gap:11px;
  text-decoration:none;
  position:relative;overflow:hidden;
  transition: transform .3s cubic-bezier(.34,1.12,.64,1), box-shadow .3s, border-color .25s;
  animation:cardIn .45s var(--ease-out) both;
  box-shadow: 0 3px 14px rgba(0,0,0,.20), inset 0 1px 0 rgba(255,255,255,.18);
}
.tool-card::after {
  content:'';position:absolute;
  top:0;left:0;right:0;height:1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.38) 40%, rgba(201,162,39,.15) 70%, transparent);
  pointer-events:none;
}
.tool-card:hover{
  border-color:rgba(201,162,39,.40);
  transform:translateY(-4px);
  box-shadow: 0 18px 48px rgba(0,0,0,.40), 0 0 20px rgba(201,162,39,.10), inset 0 1px 0 rgba(255,255,255,.24);
}
.tool-icon{font-size:32px}
.tool-name{font-size:14px;font-weight:800;color:#fff}
.tool-desc{font-size:11px;color:var(--text-dim);line-height:1.7;flex-grow:1}
.tool-tag{
  font-size:9px;font-weight:800;color:var(--gold);
  background: linear-gradient(135deg, rgba(201,162,39,.15) 0%, rgba(201,162,39,.07) 100%);
  
  border: 1px solid rgba(201,162,39,.22);
  padding:3px 11px;border-radius:99px;width:fit-content;letter-spacing:.2px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
}
.tool-open{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px;border-radius:11px;
  background: linear-gradient(135deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.02) 100%);
  border: 1px solid rgba(255,255,255,.10);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
  color:#aaa;font-size:11px;font-weight:700;text-decoration:none;
  transition: transform .32s cubic-bezier(.34,1.12,.64,1), box-shadow .32s cubic-bezier(.34,1.12,.64,1), background .32s cubic-bezier(.34,1.12,.64,1), border-color .32s cubic-bezier(.34,1.12,.64,1), color .32s cubic-bezier(.34,1.12,.64,1), opacity .32s cubic-bezier(.34,1.12,.64,1);
}
.tool-open:hover{
  border-color:rgba(201,162,39,.38);
  color:var(--gold);
  background: linear-gradient(135deg, rgba(201,162,39,.13) 0%, rgba(201,162,39,.05) 100%);
  box-shadow: 0 4px 14px rgba(201,162,39,.15), inset 0 1px 0 rgba(255,255,255,.10);
}
.tip-box{
  margin-top:30px;padding:22px 26px;
  background: linear-gradient(135deg, rgba(201,162,39,.08) 0%, rgba(12,12,26,.80) 60%, rgba(255,255,255,.04) 100%);
  border: 1px solid rgba(201,162,39,.18);
  border-radius:var(--r-xl);
  box-shadow: 0 4px 24px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.08);
}

/* ════════════════════════════════════
   RATING
════════════════════════════════════ */
.rating-widget{
  background: linear-gradient(145deg,
    rgba(255,255,255,.07) 0%,
    rgba(12,12,26,.82) 40%,
    rgba(201,162,39,.07) 100%);
  border: 1px solid rgba(201,162,39,.22);
  border-radius:var(--r-2xl);padding:36px 32px;
  text-align:center;position:relative;overflow:hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,.40), inset 0 1px 0 rgba(255,255,255,.12);
}
.rating-widget::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(201,162,39,.12) 0%,transparent 65%);
  pointer-events:none;
}
.rating-title{font-size:15px;color:#ccc;font-weight:700;margin-bottom:5px}
.rating-sub{font-size:11.5px;color:var(--text-dim);line-height:1.6}
.stars-row{display:flex;justify-content:center;gap:9px;margin:20px 0}
.star-btn{
  font-size:38px;background:none;border:none;
  transition:transform .2s var(--ease-spring),filter .2s;
  filter:grayscale(1) brightness(.4);line-height:1;
}
.star-btn.lit{filter:none}
.star-btn:hover{transform:scale(1.28)}
.star-label{font-size:12px;color:var(--text-dim);min-height:20px;margin-bottom:8px;transition:color .2s}
.rating-divider{height:1px;background:var(--border);margin:26px 0}
.avg-display{
  display:inline-flex;align-items:center;gap:13px;
  padding:12px 24px;border-radius:99px;
  background: linear-gradient(135deg, rgba(201,162,39,.18) 0%, rgba(201,162,39,.08) 100%);
  border: 1px solid rgba(201,162,39,.32);
  box-shadow: 0 4px 20px rgba(201,162,39,.15), inset 0 1px 0 rgba(255,255,255,.12);
  margin-bottom:10px;
}
.avg-stars{font-size:23px;color:var(--gold)}
.avg-num{font-size:30px;font-weight:900;color:var(--gold);font-variant-numeric:tabular-nums}
.avg-of{font-size:9px;color:var(--text-dim)}
.avg-count{font-size:10.5px;color:var(--text-dim);margin-top:7px}
.rating-bars{margin-top:20px;display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:9px;font-size:10px;color:var(--text-dim)}
.bar-track{flex:1;height:5px;border-radius:99px;background:rgba(255,255,255,.05);overflow:hidden}
.bar-fill{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--gold),var(--gold-l));
  transition:width .8s var(--ease-out);
}
.thanks-box{
  margin-top:22px;padding:20px 24px;
  background: linear-gradient(135deg, rgba(34,197,94,.10) 0%, rgba(34,197,94,.04) 100%);
  border: 1px solid rgba(34,197,94,.22);
  box-shadow: 0 4px 20px rgba(34,197,94,.08), inset 0 1px 0 rgba(255,255,255,.08);
  border-radius:var(--r-lg);text-align:center;
}

/* ════════════════════════════════════
   MODALS
════════════════════════════════════ */
.modal-bg{
  position:fixed;inset:0;z-index:200;
  background: rgba(0,0,0,.75);
  display:flex;align-items:center;justify-content:center;padding:16px;
  opacity:0;transition:opacity .3s cubic-bezier(.34,1.12,.64,1);
  pointer-events:none;
}
.modal-bg.open{opacity:1;pointer-events:all}
.modal-box{
  position:relative;width:100%;max-height:92vh;
  background: linear-gradient(145deg,
    rgba(255,255,255,.09) 0%,
    rgba(10,10,22,.90) 40%,
    rgba(12,12,26,.88) 100%);
  border: 1px solid rgba(255,255,255,.13);
  border-radius:var(--r-2xl);
  box-shadow:
    0 32px 96px rgba(0,0,0,.65),
    0 0 0 0.5px rgba(255,255,255,.06),
    inset 0 1px 0 rgba(255,255,255,.14),
    inset 0 -1px 0 rgba(0,0,0,.18);
  overflow:hidden;display:flex;flex-direction:column;
  transform:scale(.93) translateY(22px);
  transition:transform .38s cubic-bezier(.34,1.56,.64,1);
}

/* ════════════════════════════════════
   LIQUID GLASS — Ripple تأثير الموجة
════════════════════════════════════ */
.lg-ripple{
  position:absolute;
  border-radius:50%;
  background: radial-gradient(circle, rgba(255,255,255,.28) 0%, rgba(201,162,39,.12) 50%, transparent 70%);
  pointer-events:none;
  transform:scale(0);
  animation:lgRipple .55s cubic-bezier(.34,1.12,.64,1) forwards;
  z-index:99;
}
@keyframes lgRipple{
  to{transform:scale(3.5);opacity:0;}
}

════════════════════════════════════ */

}

  from{transform:scale(.7) rotate(-8deg);opacity:.5}

}

.hero-logo-wrap svg{

  border:1.5px solid rgba(255,255,255,.25);
  box-shadow:0 2px 10px rgba(201,162,39,.45),inset 0 1px 0 rgba(255,255,255,.25);
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
  cursor:grab;
}
.glass-range::-webkit-slider-thumb:hover{
  transform:scale(1.20);
  box-shadow:0 4px 18px rgba(201,162,39,.60),inset 0 1px 0 rgba(255,255,255,.30);
}
.glass-range::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(1.08)}
.glass-range::-moz-range-thumb{
  width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(255,255,255,.25);
  background:rgba(201,162,39,.90);cursor:grab;
}
.glass-slider-val{
  font-size:10px;font-weight:800;color:var(--gold);
  min-width:32px;text-align:left;
  font-variant-numeric:tabular-nums;
}

/* ════════════════════════════════════
   COLOR MATCH TOOL (تلوين سينمائي)
════════════════════════════════════ */
.cm-step{margin-bottom:26px}
.cm-step-label{
  display:flex;align-items:center;gap:10px;
  font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--gold);font-weight:800;margin-bottom:13px;
}
.cm-step-label .cm-num{
  display:flex;align-items:center;justify-content:center;
  width:20px;height:20px;border-radius:50%;
  background:var(--gold-d2);border:1px solid var(--border-gold-2);
  color:var(--gold-l);font-size:10px;font-weight:900;flex-shrink:0;
}
.cm-step-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,162,39,.3),transparent)}

.cm-dual-drop{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.cm-dual-drop{grid-template-columns:1fr}}

.cm-drop{
  position:relative;aspect-ratio:4/3;
  border:1.5px dashed var(--border-2);
  border-radius:var(--r-lg);
  background:var(--ink-2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:9px;cursor:pointer;overflow:hidden;
  transition:border-color .25s,background .25s,transform .2s;
}
.cm-drop:hover{border-color:var(--border-gold-2);background:var(--ink-3)}
.cm-drop:active{transform:scale(.98)}
.cm-drop.has-image{border-style:solid;border-color:var(--border-gold)}
.cm-drop img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cm-drop .cm-plus-icon{
  width:38px;height:38px;border-radius:50%;
  border:1.5px solid var(--border-gold-2);
  display:flex;align-items:center;justify-content:center;
  color:var(--gold);font-size:18px;font-weight:300;
  background:var(--gold-d);
}
.cm-drop-caption{font-size:12.5px;color:var(--text-soft);text-align:center;padding:0 18px;line-height:1.6}
.cm-drop-tag{
  position:absolute;top:9px;right:9px;z-index:2;
  font-size:9.5px;letter-spacing:1px;text-transform:uppercase;font-weight:800;
  background:rgba(7,7,15,.8);color:var(--gold-l);
  padding:4px 9px;border:1px solid var(--border-gold);border-radius:7px;
}
.cm-drop-remove{
  position:absolute;bottom:9px;left:9px;z-index:2;
  background:rgba(7,7,15,.85);border:1px solid var(--border-2);
  color:var(--text);font-size:11px;font-weight:700;
  padding:5px 11px;border-radius:8px;
}

.cm-panel{
  background:linear-gradient(180deg,var(--ink-2),var(--ink-3));
  border:1px solid var(--border);border-radius:var(--r-lg);
  padding:18px 18px 6px;
}
.cm-control-row{display:flex;align-items:center;gap:14px;padding:12px 0}
.cm-control-row+.cm-control-row{border-top:1px solid var(--border)}
.cm-control-label{flex-shrink:0;width:112px;font-size:12.5px;color:var(--text-soft);font-weight:500}
.cm-control-value{
  font-size:11.5px;font-weight:800;color:var(--gold);
  width:40px;text-align:left;flex-shrink:0;font-variant-numeric:tabular-nums;
}
.cm-select{
  flex:1;background:var(--ink);color:var(--text);
  border:1px solid var(--border-2);border-radius:9px;
  padding:10px 11px;font-family:inherit;font-size:12.5px;
}
.cm-select:focus{outline:none;border-color:var(--border-gold-2)}

.cm-btn-apply{
  width:100%;
  background:linear-gradient(135deg,var(--gold-l),var(--gold));
  color:#1a1305;border:none;border-radius:var(--r-lg);
  padding:16px;font-weight:900;font-size:14.5px;letter-spacing:.2px;
  display:flex;align-items:center;justify-content:center;gap:9px;
  cursor:pointer;transition:transform .15s,box-shadow .2s;
  box-shadow:0 8px 24px rgba(201,162,39,.25);
}
.cm-btn-apply:active{transform:scale(.98)}
.cm-btn-apply:disabled{
  background:var(--ink-3);color:var(--text-dim);cursor:not-allowed;box-shadow:none;
}

.cm-note{
  font-size:12px;color:var(--text-soft);line-height:1.8;
  padding:14px 16px;margin-top:14px;
  border-right:2px solid var(--border-gold-2);
  background:var(--gold-d);border-radius:0 var(--r) var(--r) 0;
}

.cm-result-wrap{
  position:relative;border-radius:var(--r-lg);overflow:hidden;
  border:1px solid var(--border-2);background:var(--ink-2);
  max-width:340px;margin:0 auto;
}
.cm-compare{position:relative;width:100%;user-select:none}
.cm-compare img{
  display:block;width:100%;height:auto;max-height:420px;object-fit:contain;
  background:var(--ink);-webkit-user-drag:none;
}
.cm-compare .cm-before-layer,.cm-compare .cm-after-layer{width:100%}
.cm-compare .cm-after-layer{display:none}
.cm-compare .cm-after-layer.show{display:block}
.cm-compare .cm-before-layer.hide{display:none}
.cm-compare-tag{
  position:absolute;top:11px;z-index:4;font-size:10px;letter-spacing:1.5px;
  font-weight:800;background:rgba(7,7,15,.75);padding:5px 10px;border-radius:7px;
  pointer-events:none;
}
.cm-compare-tag.before{right:11px;color:var(--text-soft)}
.cm-compare-tag.after{left:11px;color:var(--gold-l)}
.cm-toggle-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;max-width:340px;margin:12px auto 0;
  background:var(--ink-2);color:var(--text);
  border:1px solid var(--border-gold);border-radius:var(--r);
  padding:11px;font-weight:700;font-size:13px;cursor:pointer;
  transition:background .2s,border-color .2s;
}
.cm-toggle-btn:hover{background:var(--ink-3);border-color:var(--border-gold-2)}
.cm-toggle-btn .cm-toggle-icon{font-size:14px}

.cm-waveform-strip{display:flex;gap:2px;height:36px;margin-top:12px;border-radius:8px;overflow:hidden;max-width:340px;margin-inline:auto}
.cm-waveform-strip canvas{width:100%;height:100%}

.cm-btn-secondary{
  width:100%;background:var(--ink-2);color:var(--text);
  border:1px solid var(--border-2);border-radius:var(--r);
  padding:13px;font-weight:600;font-size:13px;cursor:pointer;
  margin-top:10px;transition:background .2s,border-color .2s;
}
.cm-btn-secondary:hover{background:var(--ink-3);border-color:var(--border-gold)}

.cm-loading-overlay{
  position:fixed;inset:0;background:rgba(7,7,15,.94);z-index:300;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  backdrop-filter:blur(6px);
}
.cm-loading-overlay.hidden{display:none}
.cm-clapper{
  width:56px;height:56px;border:2px solid var(--gold);border-radius:14px;
  position:relative;animation:cmSpin 1.4s linear infinite;
}
.cm-clapper::before{content:'';position:absolute;inset:7px;border:1px solid var(--gold-d2);border-radius:8px}
@keyframes cmSpin{to{transform:rotate(360deg)}}
.cm-loading-text{font-size:12.5px;letter-spacing:1px;color:var(--text-soft);font-weight:600}

#cmResultSection{display:none}
#cmResultSection.show{display:block}

/* ════════════════════════════════════
   COLOR TEMPLATES (قوالب المخرج)
════════════════════════════════════ */
.cm-tpl-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
}
@media(max-width:480px){
  .cm-tpl-grid{grid-template-columns:repeat(5,1fr);gap:6px}
}
.cm-tpl-item{
  position:relative;aspect-ratio:1/1;
  border-radius:10px;overflow:hidden;
  border:1px solid var(--border);
  background:var(--ink-1);cursor:pointer;
  transition:transform .2s,border-color .2s;
}
.cm-tpl-item:hover{transform:scale(1.05);border-color:var(--border-gold-2)}
.cm-tpl-item img{width:100%;height:100%;object-fit:cover;display:block}
.cm-tpl-del{
  position:absolute;top:3px;left:3px;z-index:2;
  width:18px;height:18px;border-radius:5px;
  background:rgba(7,7,15,.88);border:1px solid rgba(239,68,68,.4);
  color:#f87171;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;font-size:9px;
}
.cm-tpl-item:hover .cm-tpl-del{opacity:1}
.cm-tpl-empty{
  font-size:11.5px;color:var(--text-dim);text-align:center;
  padding:20px 10px;grid-column:1/-1;
}
.cm-tpl-upload{
  background:var(--ink-2);border:1px solid var(--border-gold);
  border-radius:var(--r-lg);padding:14px;margin-bottom:14px;
}
.cm-tpl-drop-zone{
  border:1.5px dashed var(--border-2);border-radius:var(--r);
  padding:16px;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;
}
.cm-tpl-drop-zone:hover,.cm-tpl-drop-zone.drag-over{
  border-color:var(--border-gold-2);background:var(--ink-3);
}

/* Template preview/confirm modal */
.cm-tpl-preview-img{
  width:100%;max-height:60vh;object-fit:contain;
  border-radius:var(--r);background:var(--ink);
}
</style>
</head>
